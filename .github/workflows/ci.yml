name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test against amc ${{ matrix.amc-tag }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        amc-tag: [v0.8.74]
    steps:
      # Self-contained package: no sibling-package deps, only the amc
      # runtime + a C toolchain + python3 (for the integration probes).
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgc-dev python3

      - name: Download amc ${{ matrix.amc-tag }}
        run: |
          set -e
          TAG="${{ matrix.amc-tag }}"
          VERSION="${TAG#v}"
          curl -sSL -o amc.tar.gz \
            "https://github.com/amalgame-lang/Amalgame/releases/download/${TAG}/amc-${VERSION}-linux-x86_64.tar.gz"
          mkdir -p $RUNNER_TEMP/amc-install
          tar -xzf amc.tar.gz -C $RUNNER_TEMP/amc-install --strip-components=1
          echo "AMC=$RUNNER_TEMP/amc-install/bin/amc" >> $GITHUB_ENV
          echo "AMC_RUNTIME=$RUNNER_TEMP/amc-install/share/amalgame/runtime" >> $GITHUB_ENV

      - name: Run tests
        env:
          AMC_RUNTIME: ${{ env.AMC_RUNTIME }}
        run: ./tests/run_tests.sh "$AMC"
