[package]
name              = "amalgame-net-stream"
version           = "0.2.0"
license           = "Apache-2.0"
description       = "Raw L4 TCP + UDP stream proxy for the Mosaic stack — binary-safe byte splicing (TCP) and datagram forwarding (UDP) to a fixed upstream (the nginx stream{} / HAProxy TCP+UDP-mode slice). Security wired in by default: idle (+ connect) timeouts, global & per-source-IP caps, SIGPIPE-safe, graceful shutdown. v0.2.0 adds UDP; load-balancing, IPv6 listener and TLS edge are tracked follow-ups."
required-amalgame = ">=0.8.58"
schema-version    = 1

[stdlib]
classes   = ["TcpProxy", "UdpProxy"]
header    = "runtime/Amalgame_Net_Stream.h"
namespace = "Amalgame.Net.Stream"
facade    = "facade.am"
libs      = ["pthread"]
